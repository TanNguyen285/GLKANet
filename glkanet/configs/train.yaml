# ============================================================
# configs/train.yaml — Train config
# Dùng: model.train("configs/train.yaml")
# ============================================================

model_yaml: shuffle_glkav1.yaml      # relative so với file này hoặc absolute
data:       dataset.yaml  # relative so với project root

img_size: 224

normalize:
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

augment:
  crop_scale: [0.7, 1.0]
  flip_h:     0.5
  flip_v:     0.3
  color_jitter:
    brightness: 0.3
    contrast:   0.3
    saturation: 0.2
    hue:        0.05

train:
  epochs:     2
  batch_size: 64
  seed:       42
  val_ratio:  0.1       # dùng khi không có val: trong dataset.yaml -> tự tách từ train_set
  test_ratio: 0         # để 0 vì test_set đã tách vật lý sẵn trên đĩa, không cần loader tự chia nữa
  handle_imbalance: true
  label_smoothing:  0.0

  optimizer:
    type:         SGD
    lr:           0.01
    momentum:     0.9
    weight_decay: 0.0005
    nesterov:     true

  scheduler:
    type:    CosineAnnealingLR
    eta_min: 0.000001

hardware:
  device:      cuda
  num_workers: 8
  pin_memory:  true

logging:
  runs_dir:      runs
  tsne_interval: 20
  eval_test:     true

export:
  enabled: true
  opset:   18
  export_tflite: true
  tflite_mode:   all          # fp32 | fp16 | int8 | all
  n_calib:       200

  # Thư mục ImageFolder test THẬT, đã tách vật lý bằng scripts/split_ccmt_to_disk.py.
  # Dùng luôn để: (1) calibrate int8, (2) eval accuracy ONNX/TFLite so sánh với PyTorch.
  test_dir: "C:/Users/ThisPC/Desktop/Raw Data/CCMT Dataset/test_set"

  # Path tới thư mục chứa environment.py + onnx_to_tflite.py + venv-tflite
  tflite_project_dir: "C:/Users/ThisPC/Documents/GitHub/Simple_GLKA/TFlite"
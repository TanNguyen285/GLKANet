  # ============================================================
  # configs/train.yaml — Train config
  # Dùng: model.train("configs/train.yaml")
  # ============================================================

  model_yaml: shuffle_glkav2.yaml      # relative so với file này hoặc absolute
  data:       dataset.yaml  # relative so với project root

  img_size: 224

  normalize:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

  augment:
    crop_scale: [0.7, 1.0]
    flip_h:     0.5
    flip_v:     0.3
    color_jitter:
      brightness: 0.3
      contrast:   0.3
      saturation: 0.2
      hue:        0.05

  train:
    epochs:     80
    batch_size: 64
    seed:       42
    val_ratio:  0.1       # dùng khi không có val: trong dataset.yaml
    test_ratio: 0.1       # dùng khi không có test: và train only
    handle_imbalance: true   # true: dùng weighted sampler, false: dùng dataloader bình thường
    label_smoothing:  0.0

    optimizer:
      type:         SGD   # SGD | AdamW
      lr:           0.01
      momentum:     0.9
      weight_decay: 0.0005
      nesterov:     true

    scheduler:
      type:    CosineAnnealingLR   # CosineAnnealingLR | StepLR
      eta_min: 0.000001

  hardware:
    device:      cuda     # auto | cuda | cpu
    num_workers: 8        # Windows lỗi → đổi thành 0
    pin_memory:  true

  logging:
    runs_dir:      runs
    tsne_interval: 20     # 0 = tắt
    eval_test:     true

  export:
    enabled: true
    opset:   18
